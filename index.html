<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https: data:; frame-src https://www.youtube.com; connect-src 'self' https://formsubmit.co;">
    
    <title>Nash Wu — Creator & YouTuber</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0e0c0a;
            --surface: #161310;
            --card: #1c1814;
            --border: rgba(255,255,255,0.07);
            --text: #f0e6d3;
            --muted: #8a7d6e;
            --accent: #c9a96e;
            --accent2: #e8c88a;
            --white: #f5f0e8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 背景雜訊效果 */
        body::before {
            content: '';
            position: fixed; inset: 0;
            z-index: 9999; pointer-events: none;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 32px; }

        /* Navbar */
        nav { position: fixed; top: 0; width: 100%; z-index: 100; padding: 24px 0; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        nav.scrolled { background: rgba(14,12,10,0.85); backdrop-filter: blur(20px); padding: 16px 0; border-bottom: 1px solid var(--border); }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--white); text-decoration: none; font-weight: 900; }
        .logo em { color: var(--accent); font-style: normal; }
        .nav-links { display: flex; gap: 40px; }
        .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        /* Hero */
        .hero { min-height: 100vh; display: flex; align-items: center; position: relative; overflow: hidden; }
        .hero-bg-glow { position: absolute; inset: 0; background: radial-gradient(circle at 60% 40%, rgba(201,169,110,0.05) 0%, transparent 50%); z-index: 0; }
        .hero-content { position: relative; z-index: 2; }
        .hero-label { display: inline-flex; align-items: center; gap: 10px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); border: 1px solid rgba(201,169,110,0.2); padding: 8px 16px; border-radius: 100px; margin-bottom: 32px; }
        .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(4rem, 12vw, 9rem); font-weight: 900; line-height: 0.9; color: var(--white); margin-bottom: 24px; }
        .hero-title em { color: var(--accent); font-style: italic; }
        .hero-desc { font-size: 1.1rem; color: var(--muted); max-width: 500px; margin-bottom: 48px; }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; padding: 16px 36px; border-radius: 100px; font-weight: 700; font-size: 0.9rem; text-decoration: none; transition: 0.3s; cursor: pointer; border: none; }
        .btn-primary { background: var(--accent); color: var(--bg); }
        .btn-primary:hover { background: var(--accent2); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(201,169,110,0.2); }
        .btn-secondary { background: transparent; color: var(--white); border: 1px solid var(--border); margin-left: 16px; }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

        /* Portfolio Section */
        #work { padding: 140px 0; }
        .section-header { margin-bottom: 60px; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: var(--white); }
        .section-title em { color: var(--accent); font-style: italic; }

        /* Carousel */
        .carousel-viewport { overflow: hidden; margin: 0 -15px; }
        .carousel-track { display: flex; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); gap: 30px; padding: 20px 15px; }
        .carousel-slide { min-width: calc(33.333% - 20px); }

        .video-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); transition: 0.4s; cursor: pointer; }
        .video-card:hover { transform: translateY(-10px); border-color: rgba(201,169,110,0.3); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .video-thumb { position: relative; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        .video-thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .video-card:hover .video-thumb img { transform: scale(1.05); }
        .video-info { padding: 24px; }
        .video-title { font-size: 1rem; font-weight: 700; color: var(--white); margin-bottom: 8px; }
        .video-desc { font-size: 0.85rem; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Full Library */
        #full-library { max-height: 0; overflow: hidden; transition: max-height 0.8s ease; opacity: 0; }
        #full-library.open { max-height: 5000px; opacity: 1; margin-top: 60px; }
        .videos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }

        /* Contact */
        .contact { padding: 140px 0; background: var(--surface); }
        .contact-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 100px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; letter-spacing: 0.1em; }
        input, textarea { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; color: var(--white); font-family: inherit; transition: 0.3s; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(14,12,10,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal.open { display: flex; }
        .modal-content { width: 90%; max-width: 1100px; aspect-ratio: 16/9; position: relative; }
        .modal-close { position: absolute; top: -50px; right: 0; color: var(--white); background: none; border: none; font-size: 1.5rem; cursor: pointer; }

        /* Animations */
        .fade-up { opacity: 0; transform: translateY(30px); transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .fade-up.visible { opacity: 1; transform: translateY(0); }

        @media (max-width: 1024px) { .carousel-slide { min-width: calc(50% - 15px); } .videos-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { 
            .nav-links { display: none; } 
            .hero-title { font-size: 5rem; } 
            .contact-grid { grid-template-columns: 1fr; gap: 60px; }
            .carousel-slide { min-width: 100%; }
            .videos-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="container nav-inner">
            <a href="#" class="logo">Nash<em>Wu</em></a>
            <div class="nav-links">
                <a href="#work">Portfolio</a>
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-bg-glow"></div>
        <div class="container hero-content">
            <div class="fade-up">
                <div class="hero-label"><span style="width:6px; height:6px; background:var(--accent); border-radius:50%;"></span> 旅遊 · 生活 · AI 創作</div>
                <h1 class="hero-title">Nash<br><em>Wu.</em></h1>
                <p class="hero-desc">我是一位熱愛探索的創作者，透過鏡頭與 AI，將海外生活的每一刻轉化為視覺故事。</p>
                <div class="hero-btns">
                    <a href="#work" class="btn btn-primary">觀看作品集</a>
                    <a href="#contact" class="btn btn-secondary">合作洽談</a>
                </div>
            </div>
        </div>
    </section>

    <section id="work">
        <div class="container">
            <div class="section-header fade-up">
                <h2 class="section-title">最新<em>影片</em></h2>
            </div>

            <div id="loading-state" style="color: var(--muted);">正在載入...</div>

            <div id="carousel-section" style="display: none;">
                <div class="carousel-viewport">
                    <div id="carousel-track" class="carousel-track"></div>
                </div>
                <div style="text-align: center; margin-top: 60px;">
                    <button onclick="toggleLibrary()" class="btn btn-secondary" id="lib-btn-text">探索所有影片</button>
                </div>
            </div>

            <div id="full-library">
                <div id="videos-grid" class="videos-grid"></div>
            </div>
        </div>
    </section>

    <section id="contact" class="contact">
        <div class="container contact-grid">
            <div class="fade-up">
                <h2 class="section-title">開始<em>合作</em></h2>
                <p style="color: var(--muted); margin-top: 24px;">隨時歡迎你的來信，無論是影音創作或是品牌推廣。</p>
                <div style="margin-top: 48px;">
                    <label>Email Me</label>
                    <a href="mailto:nashwu0990117@gmail.com" style="color: var(--accent); text-decoration: none; font-size: 1.4rem; font-weight: 700;">nashwu0990117@gmail.com</a>
                </div>
            </div>
            <form id="contact-form" class="fade-up">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" placeholder="你的名稱" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea name="message" rows="5" placeholder="告訴我想談些什麼..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;"><span>傳送訊息</span></button>
            </form>
        </div>
    </section>

    <div id="video-modal" class="modal" onclick="closeVideo()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeVideo()">Close ×</button>
            <iframe id="youtube-player" width="100%" height="100%" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const CONTACT_EMAIL = "nashwu0990117@gmail.com";
        let ALL_VIDEOS = [];

        // 初始化與載入影片
        async function init() {
            try {
                const r = await fetch(`videos.json?t=${Date.now()}`);
                const d = await r.json();
                ALL_VIDEOS = Array.isArray(d) ? d : (d.items || []);
                render();
            } catch (e) { console.error("Videos load failed"); }
        }

        function render() {
            const track = document.getElementById('carousel-track');
            const grid = document.getElementById('videos-grid');
            if (ALL_VIDEOS.length === 0) return;

            const html = ALL_VIDEOS.map(v => `
                <div class="video-card ${track ? 'carousel-slide' : ''}" onclick="playVideo('${v.id}')">
                    <div class="video-thumb">
                        <img src="${v.thumbnail}" loading="lazy">
                    </div>
                    <div class="video-info">
                        <div class="video-title">${v.title}</div>
                        <div class="video-desc">${v.desc || ''}</div>
                    </div>
                </div>
            `).join('');

            track.innerHTML = html;
            grid.innerHTML = html;
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('carousel-section').style.display = 'block';
        }

        function playVideo(id) {
            document.getElementById('youtube-player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            document.getElementById('video-modal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            document.getElementById('video-modal').classList.remove('open');
            document.getElementById('youtube-player').src = '';
            document.body.style.overflow = '';
        }

        function toggleLibrary() {
            const lib = document.getElementById('full-library');
            const btn = document.getElementById('lib-btn-text');
            lib.classList.toggle('open');
            btn.textContent = lib.classList.contains('open') ? '收起影片庫' : '探索所有影片';
        }

        // Navbar 滾動效果
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
        });

        // 滾動出現動畫
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

        // 表單處理
        document.getElementById('contact-form').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const span = btn.querySelector('span');
            span.textContent = '傳送中...';
            try {
                await fetch(`https://formsubmit.co/ajax/${CONTACT_EMAIL}`, {
                    method: 'POST',
                    body: new FormData(e.target)
                });
                span.textContent = '已成功送出 ✓';
                e.target.reset();
            } catch {
                span.textContent = '傳送失敗，請重試';
            }
        });

        init();
    </script>
</body>
</html>
